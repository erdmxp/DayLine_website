services:
  - type: web
    name: dayline-website
    runtime: node
    plan: free
    buildCommand: npm ci && npx @tailwindcss/cli -i ./src/input.css -o ./dist/assets/main.css
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
