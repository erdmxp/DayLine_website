<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="assets/main.css">
</head>

<body>
    <div class="bg-cover bg-center h-screen" style="background-image: url('../image/morning_main.png')">


        <header class="pt-5">
            <div class="mx-auto bg-white/40 h-10 rounded-4xl w-lg">
                
            </div>
        </header>


        <div class="flex justify-center items-center gap-8 pt-40 px-4">
    
    
    <div class="w-128 h-96 flex flex-col items-center justify-center gap-3 
                   bg-black/30 backdrop-blur-md border border-white/20 rounded-2xl 
                   text-white shadow-lg">
        <!-- КАЛЕНДАРЬ -->
<div class="w-full h-full flex flex-col p-6">
    <!-- Заголовок с месяцем и кнопками -->
    <div class="flex items-center justify-between mb-4">
        <button id="prevMonth" class="p-2 rounded-lg bg-white/10 hover:bg-white/20 transition-all">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
            </svg>
        </button>
        
        <h2 id="monthYear" class="text-lg font-semibold text-white"></h2>
        
        <button id="nextMonth" class="p-2 rounded-lg bg-white/10 hover:bg-white/20 transition-all">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
            </svg>
        </button>
    </div>

    <!-- Дни недели -->
    <div class="grid grid-cols-7 gap-1 mb-2">
        <div class="text-center text-xs text-white/60 py-1">Пн</div>
        <div class="text-center text-xs text-white/60 py-1">Вт</div>
        <div class="text-center text-xs text-white/60 py-1">Ср</div>
        <div class="text-center text-xs text-white/60 py-1">Чт</div>
        <div class="text-center text-xs text-white/60 py-1">Пт</div>
        <div class="text-center text-xs text-white/60 py-1">Сб</div>
        <div class="text-center text-xs text-white/60 py-1">Вс</div>
    </div>

        <!-- Сетка дней -->
        <div id="calendarDays" class="grid grid-cols-7 gap-1 flex-1">
            <!-- Дни генерируются через JS -->
        </div>
    </div>
    <script src="/scripts/calendar.js" defer></script>
    </div>

    <div class="w-lg h-96 flex flex-row items-center justify-center gap-3 
                   bg-black/30 backdrop-blur-md border border-white/20 rounded-2xl 
                   text-white shadow-lg">

                   <div class="w-90 h-90 flex flex-col items-center justify-center gap-3 absolute inset-y-3 left-3
                   bg-black/30 backdrop-blur-md border border-white/20 rounded-2xl 
                   text-white shadow-lg">

                    </div>

                   <div class="w-20 h-90 flex flex-col items-center pt-2 gap-2 absolute inset-y-2 right-2">
                        <div class="w-15 h-15 flex flex-col items-center justify-center bg-green-600/30 backdrop-blur-md border border-green-300/30 rounded-2xl 
                        text-white hover:bg-green-600/50 transition-all duration-300">
                            <img class="w-10 h-10" src="/image/icons/icon_add.png"/>
                        </div>
                        <div class="w-15 h-15 flex flex-col items-center justify-center bg-red-600/30 backdrop-blur-md border border-red-400/30 rounded-2xl
                        text-white hover:bg-red-600/50 transition-all duration-300 ">
                            <img class="w-10 h-10" src="/image/icons/icon_delete.png"/>
                        </div>
                        <div class="w-15 h-15 flex flex-col items-center justify-center bg-blue-600/30 backdrop-blur-md border border-blue-400/30 rounded-2xl
                        hover:bg-blue-600/50 transition-all duration-300">
                            <img class="w-10 h-10" src="/image/icons/icon_edit.png"/>
                        </div>
                   </div>


    </div>

    <div class="w-128 h-96 flex flex-col items-center justify-center gap-3 
                   bg-blue-900/30 backdrop-blur-md border border-blue-400/30 rounded-2xl 
                   text-white hover:bg-blue-900/50 hover:scale-105 transition-all duration-300 shadow-lg">

    </div>

</div>


    </div>
    
</body>
</html>
