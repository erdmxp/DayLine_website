<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="assets/main.css">
</head>

<body>
    <div class="min-h-screen bg-cover bg-center" style="background-image: url('../image/morning_main.png')">

        <header class="pt-5">
            <div class="mx-auto h-10 w-[calc(100%-2rem)] max-w-lg rounded-4xl bg-white/40"></div>
        </header>

        <div class="flex flex-col items-center justify-center gap-6 px-4 pb-8 pt-8 xl:flex-row xl:gap-8 xl:pt-40">

            <!-- КАЛЕНДАРЬ -->
            <div class="min-h-96 w-full max-w-128 flex flex-col items-center justify-center gap-3 
                           bg-black/30 backdrop-blur-md border border-white/20 rounded-2xl 
                           text-white shadow-lg">
                <div class="w-full h-full flex flex-col p-6">
                    <div class="flex items-center justify-between mb-4">
                        <button id="prevMonth" class="p-2 rounded-lg bg-white/10 hover:bg-white/20 transition-all">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                            </svg>
                        </button>
                        <h2 id="monthYear" class="text-lg font-semibold text-white"></h2>
                        <button id="nextMonth" class="p-2 rounded-lg bg-white/10 hover:bg-white/20 transition-all">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                            </svg>
                        </button>
                    </div>
                    <div class="grid grid-cols-7 gap-1 mb-2">
                        <div class="text-center text-xs text-white/60 py-1">Пн</div>
                        <div class="text-center text-xs text-white/60 py-1">Вт</div>
                        <div class="text-center text-xs text-white/60 py-1">Ср</div>
                        <div class="text-center text-xs text-white/60 py-1">Чт</div>
                        <div class="text-center text-xs text-white/60 py-1">Пт</div>
                        <div class="text-center text-xs text-white/60 py-1">Сб</div>
                        <div class="text-center text-xs text-white/60 py-1">Вс</div>
                    </div>
                    <div id="calendarDays" class="grid grid-cols-7 gap-1 flex-1"></div>
                </div>
                <script src="/scripts/calendar.js" defer></script>
            </div>

            <!-- TODO ВИДЖЕТ -->
            <div class="h-96 w-full max-w-lg flex flex-row items-center justify-center gap-3 
                           bg-black/30 backdrop-blur-md border border-white/20 rounded-2xl 
                           text-white shadow-lg relative">

                <div class="h-90 w-[calc(100%-5.5rem)] flex flex-col absolute inset-y-3 left-3
                               bg-black/30 backdrop-blur-md border border-white/20 rounded-2xl 
                               text-white shadow-lg overflow-hidden">

                    <div id="inputArea" class="hidden px-3 pt-3 pb-2 border-b border-white/10">
                        <input
                            id="taskInput"
                            type="text"
                            placeholder="Введите задачу..."
                            maxlength="80"
                            class="w-full bg-white/10 border border-white/20 rounded-xl px-3 py-2 text-sm text-white placeholder-white/40 outline-none focus:border-white/50"
                        />
                        <div id="editHint" class="hidden text-xs text-white/40 mt-1 px-1"></div>
                        <div class="mt-2 grid grid-cols-2 gap-2">
                            <button
                                id="saveTask"
                                type="button"
                                class="min-h-11 rounded-xl border border-green-300/30 bg-green-600/40 px-3 py-2 text-sm font-medium text-white transition hover:bg-green-600/60 active:scale-95"
                            >
                                Сохранить
                            </button>
                            <button
                                id="cancelTask"
                                type="button"
                                class="min-h-11 rounded-xl border border-white/20 bg-white/10 px-3 py-2 text-sm font-medium text-white transition hover:bg-white/20 active:scale-95"
                            >
                                Отмена
                            </button>
                        </div>
                    </div>

                    <ul id="taskList" class="flex-1 overflow-y-auto px-2 py-2 space-y-1">
                        <li id="emptyState" class="flex flex-col items-center justify-center h-full text-white/30 text-sm gap-2 py-8">
                            <svg class="w-8 h-8 opacity-40" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                            </svg>
                            <span>Список пуст</span>
                        </li>
                    </ul>

                    <div class="px-3 py-2 border-t border-white/10 flex items-center justify-between">
                        <span id="taskCounter" class="text-xs text-white/40"></span>
                        <span id="currentDateLabel" class="text-xs text-white/40"></span>
                    </div>
                </div>

                <div class="w-20 h-90 flex flex-col items-center pt-2 gap-2 absolute inset-y-2 right-2">
                    <button id="btnAdd"
                        class="w-15 h-15 flex flex-col items-center justify-center bg-green-600/30 backdrop-blur-md border border-green-300/30 rounded-2xl 
                        text-white hover:bg-green-600/50 transition-all duration-300 cursor-pointer">
                        <img class="w-10 h-10" src="/image/icons/icon_add.png"/>
                    </button>
                    <button id="btnDelete"
                        class="w-15 h-15 flex flex-col items-center justify-center bg-red-600/30 backdrop-blur-md border border-red-400/30 rounded-2xl
                        text-white hover:bg-red-600/50 transition-all duration-300 cursor-pointer">
                        <img class="w-10 h-10" src="/image/icons/icon_delete.png"/>
                    </button>
                    <button id="btnEdit"
                        class="w-15 h-15 flex flex-col items-center justify-center bg-blue-600/30 backdrop-blur-md border border-blue-400/30 rounded-2xl
                        hover:bg-blue-600/50 transition-all duration-300 cursor-pointer">
                        <img class="w-10 h-10" src="/image/icons/icon_edit.png"/>
                    </button>
                </div>
            </div>

            <!-- Третий виджет -->
            <div class="h-48 w-full max-w-128 flex flex-col items-center justify-center gap-3 xl:h-96
                           bg-blue-900/30 backdrop-blur-md border border-blue-400/30 rounded-2xl 
                           text-white hover:bg-blue-900/50 hover:scale-105 transition-all duration-300 shadow-lg">
            </div>
        </div>
    </div>

    <script src="scripts/todo.js" defer></script>
</body>
</html>
