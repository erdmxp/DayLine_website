<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Главная - DayLine</title>
    <link rel="stylesheet" href="assets/main.css">
</head>

<body>
    <div class="min-h-screen bg-[url('/image/morning_main.png')] bg-cover bg-center px-4 pb-10">


        <header class="pt-5">
            <div class="mx-auto flex w-full max-w-5xl items-center justify-between gap-4 rounded-2xl border border-white/20 bg-black/25 px-4 py-3 text-white shadow-lg backdrop-blur-md sm:rounded-full sm:px-6">
                <div class="min-w-0">
                    <p class="text-lg font-semibold sm:text-xl">DayLine</p>
                    <p class="truncate text-xs text-white/65 sm:text-sm">Выбери, чем хочешь заняться сегодня</p>
                </div>
                <div class="flex shrink-0 items-center gap-2">
                    <button id="openFeedbackBtn" type="button" class="rounded-full border border-white/20 bg-white/10 px-3 py-2 text-sm font-medium transition hover:bg-white/20 sm:px-4">
                        Обратная связь
                    </button>
                    <a href="/logout" class="rounded-full border border-white/20 bg-white/10 px-4 py-2 text-sm font-medium transition hover:bg-white/20">
                        Выйти
                    </a>
                </div>
            </div>
        </header>


        <div class="mx-auto grid max-w-5xl grid-cols-1 gap-5 pt-12 sm:grid-cols-2 sm:pt-20 lg:grid-cols-3 lg:gap-8 lg:pt-28">
    
    <a href="todolist.html" class="h-40 w-full flex flex-col items-center justify-center gap-3 sm:h-48
                   bg-black/30 backdrop-blur-md border border-white/20 rounded-2xl 
                   text-white hover:bg-black/50 hover:scale-105 transition-all duration-300 shadow-lg">
        <span class="text-4xl">📝</span>
        <span class="text-lg font-bold tracking-wide">Список дел</span>
        <span class="text-xs text-white/60"></span>
    </a>

    <a href="finance.html" class="h-40 w-full flex flex-col items-center justify-center gap-3 sm:h-48
                   bg-pink-900/30 backdrop-blur-md border border-pink-400/30 rounded-2xl 
                   text-white hover:bg-pink-900/50 hover:scale-105 transition-all duration-300 shadow-lg">
        <span class="text-4xl">💳</span>
        <span class="text-lg font-bold tracking-wide">Финансы</span>
        <span class="text-xs text-pink-200/80"></span>
    </a>

    <a href="nutrition.html" class="h-40 w-full flex flex-col items-center justify-center gap-3 sm:col-span-2 sm:h-48 lg:col-span-1
                   bg-blue-900/30 backdrop-blur-md border border-blue-400/30 rounded-2xl 
                   text-white hover:bg-blue-900/50 hover:scale-105 transition-all duration-300 shadow-lg">
        <span class="text-4xl">🥗</span>
        <span class="text-lg font-bold tracking-wide">Питание</span>
        <span class="text-xs text-blue-200/80"></span>
    </a>

</div>


    </div>

    <div id="feedbackModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-slate-950/70 p-4 backdrop-blur-sm" role="dialog" aria-modal="true" aria-labelledby="feedbackTitle">
        <div class="w-full max-w-lg rounded-3xl bg-white p-5 text-slate-900 shadow-2xl sm:p-7">
            <div class="flex items-start justify-between gap-4">
                <div>
                    <p class="text-sm font-medium text-blue-600">Помоги улучшить DayLine</p>
                    <h2 id="feedbackTitle" class="mt-1 text-2xl font-semibold">Обратная связь</h2>
                </div>
                <button id="closeFeedbackBtn" type="button" class="grid h-10 w-10 shrink-0 place-items-center rounded-full bg-slate-100 text-xl transition hover:bg-slate-200" aria-label="Закрыть">×</button>
            </div>

            <form id="feedbackForm" class="mt-6 space-y-4">
                <div>
                    <label for="feedbackType" class="mb-1.5 block text-sm font-medium">Тип обращения</label>
                    <select id="feedbackType" class="w-full rounded-xl border border-slate-200 bg-white px-4 py-3 outline-none focus:border-blue-500">
                        <option value="problem">Проблема</option>
                        <option value="suggestion">Предложение</option>
                    </select>
                </div>

                <div>
                    <label for="feedbackMessage" class="mb-1.5 block text-sm font-medium">Описание</label>
                    <textarea id="feedbackMessage" rows="5" maxlength="2000" required placeholder="Опиши проблему или предложи улучшение" class="w-full resize-none rounded-xl border border-slate-200 px-4 py-3 outline-none placeholder:text-slate-400 focus:border-blue-500"></textarea>
                    <div class="mt-1 flex items-center justify-between text-xs text-slate-400">
                        <span id="feedbackError" class="text-red-600"></span>
                        <span><span id="feedbackCounter">0</span>/2000</span>
                    </div>
                </div>

                <button id="submitFeedbackBtn" type="submit" class="w-full rounded-xl bg-blue-600 px-5 py-3 font-semibold text-white transition hover:bg-blue-500">
                    Отправить
                </button>
            </form>
        </div>
    </div>

    <script src="/scripts/ui.js"></script>
    <script src="/scripts/main.js"></script>
</body>
</html>
