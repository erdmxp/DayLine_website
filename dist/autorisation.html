<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./assets/main.css">
    <script src="/scripts/autorisation.js" defer></script>
</head>



<body>
  <div class="min-h-screen bg-center bg-cover" style="background-image: url('../image/morning_main.png')">
    <header class="pt-5">
      <div class="mx-auto h-10 w-[calc(100%-2rem)] max-w-lg rounded-4xl bg-white/40">
        <p class="text-center p-1 text-xl">Авторизация</p>
      </div>
    </header>

    <div class="flex justify-center px-4 pb-8 pt-16 sm:pt-40">
        <div class="h-auto w-full max-w-xl">
            <div class="mx-auto h-max w-full max-w-lg rounded-4xl bg-blue-400/40 p-4 shadow-2xl sm:p-6">
                <form novalidate id="autorisationForm" class="flex flex-col items-center gap-4">
                    <p class="text-center text-gray-700 text-2xl">С возвращением!😃</p>
                    <div class="w-full">
                         <input type="text" id="login" name="login" required placeholder="Ник или почта" class="w-full h-10 bg-white/60 rounded-4xl pl-4 text-xl outline-0 border-2 border-transparent">
                         <p id="loginError" class="mt-1 hidden pl-4 text-lg text-red-500"></p>
                    </div>
                    
                    <div class="w-full">
                        <input type="password" id="password" name="password" required placeholder="Пароль" class="w-full h-10 bg-white/60 rounded-4xl pl-4 text-xl outline-0 border-2 border-transparent">
                        <p id="passwordError" class="mt-1 hidden pl-4 text-lg text-red-500"></p>
                    </div>
                    
                    
                    <button type="submit" class="w-50 h-15 text-center bg-blue-700/50 rounded-4xl text-2xl text-white border-2 border-blue-500 hover:bg-blue-700/70 hover:scale-105 transition-all duration-300 shadow-lg">Войти</button>
                
                    <div>
                        <p id="inputError" class="mt-1 hidden pl-4 text-lg text-red-500"></p>
                    </div>
                </form>
                

            
            </div>
        </div>
        


    </div>
    


</body>
